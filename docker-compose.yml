services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "3007:8080"
    environment:
      NODE_ENV: production
    restart: unless-stopped
    networks:
      - frontend

  web-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3007:5173"
    environment:
      NODE_ENV: development
    volumes:
      - ./:/app
      - /app/node_modules
    networks:
      - frontend

  api:
    profiles: ["backend"]
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: change-me-in-production
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:3007
      POSTGRES_DB: studynotes
      POSTGRES_USER: studynotes
      POSTGRES_PASSWORD: studynotes
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    networks:
      - frontend
      - backend

  worker:
    profiles: ["backend"]
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A studynotes_backend worker -l info
    environment:
      DJANGO_SECRET_KEY: change-me-in-production
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      POSTGRES_DB: studynotes
      POSTGRES_USER: studynotes
      POSTGRES_PASSWORD: studynotes
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    networks:
      - backend

  db:
    profiles: ["backend"]
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: studynotes
      POSTGRES_USER: studynotes
      POSTGRES_PASSWORD: studynotes
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  redis:
    profiles: ["backend"]
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - backend

volumes:
  pgdata:

networks:
  frontend:
  backend:

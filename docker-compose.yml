services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "3007:8080"
    environment:
      NODE_ENV: production
    restart: unless-stopped

  web-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3007:5173"
    environment:
      NODE_ENV: development
    volumes:
      - ./:/app
      - /app/node_modules
